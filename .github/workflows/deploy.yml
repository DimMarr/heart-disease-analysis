name: Deploy rapport to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/rapport.Rmd"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.3"
          use-public-rspm: true

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v1

      - name: Setup TinyTeX
        uses: r-lib/actions/setup-tinytex@v2

      - name: Install R packages
        run: Rscript -e "install.packages(c('rmarkdown','knitr','dplyr','ggplot2','tidyr','scales','kableExtra','corrplot','forcats','broom','gridExtra'))"

      - name: Render rapport.Rmd -> index.html
        run: |
          mkdir -p docs
          Rscript -e "rmarkdown::render('src/rapport.Rmd', output_dir='docs', output_file='index.html')"

      - name: Render rapport.Rmd -> PDF
        run: |
          Rscript -e "rmarkdown::render('src/rapport.Rmd', output_format='pdf_document', output_dir='docs', output_file='rapport.pdf')"

      - name: Upload PDF artifact
        uses: actions/upload-artifact@v4
        with:
          name: rapport-pdf
          path: docs/rapport.pdf
          retention-days: 30

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
