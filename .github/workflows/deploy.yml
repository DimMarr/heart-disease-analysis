name: Deploy rapport to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "src/rapport.Rmd"
      - "data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  render-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.3"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pandoc \
            libcurl4-openssl-dev libssl-dev libxml2-dev \
            libfontconfig1-dev libharfbuzz-dev libfribidi-dev \
            libfreetype6-dev libpng-dev libtiff5-dev libjpeg-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-4.3.3-${{ hashFiles('src/rapport.Rmd') }}
          restore-keys: r-4.3.3-

      - name: Install R packages
        run: |
          Rscript -e "install.packages(
            c('rmarkdown','knitr','dplyr','ggplot2','tidyr','scales',
              'kableExtra','corrplot','forcats','broom','gridExtra'),
            repos = 'https://cran.rstudio.com/'
          )"

      - name: Render rapport.Rmd → index.html
        run: |
          mkdir -p docs
          Rscript -e "rmarkdown::render(
            'src/rapport.Rmd',
            output_dir  = 'docs',
            output_file = 'index.html'
          )"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
