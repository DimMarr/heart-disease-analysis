name: Build & push Docker images to GHCR

on:
  push:
    branches: [main]
    paths:
      - "src/app.R"
      - "src/rapport.Rmd"
      - "data/**"
      - "build/**"
      - ".github/workflows/docker-publish.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  REPO: ${{ github.event.repository.name }}

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Image shiny ────────────────────────────────────────────────────────
      - name: Extract metadata (shiny)
        id: meta-shiny
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-shiny
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push shiny image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.shiny
          push: true
          tags: ${{ steps.meta-shiny.outputs.tags }}
          labels: ${{ steps.meta-shiny.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Image frontend ─────────────────────────────────────────────────────
      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO }}-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: build/Dockerfile.frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
