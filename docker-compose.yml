services:

  # Application R Shiny (non exposée directement, proxifiée par frontend)
  shiny:
    build:
      context: .
      dockerfile: build/Dockerfile.shiny
    expose:
      - "3838"
    restart: unless-stopped

  # Frontend : nginx reverse proxy + rapport HTML statique
  # Accès : http://localhost        → landing page
  #          http://localhost/rapport.html → rapport
  #          http://localhost/app    → application Shiny
  frontend:
    build:
      context: .
      dockerfile: build/Dockerfile.frontend
    ports:
      - "80:80"
    depends_on:
      - shiny
    restart: unless-stopped
